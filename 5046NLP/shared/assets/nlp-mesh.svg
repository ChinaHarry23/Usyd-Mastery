<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" fill="none">
  <defs>
    <linearGradient id="line" x1="195" y1="160" x2="1425" y2="1010" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="0.55" stop-color="#6ee7b7"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="nodeEmerald" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 0) rotate(90) scale(36)">
      <stop stop-color="#ecfdf5"/>
      <stop offset="0.38" stop-color="#6ee7b7"/>
      <stop offset="1" stop-color="#059669" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeCyan" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 0) rotate(90) scale(42)">
      <stop stop-color="#e0fcff"/>
      <stop offset="0.4" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowSoft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Attention-pattern arcs (cross-connections like transformer attention) -->
  <g opacity="0.18" stroke="#6ee7b7" stroke-width="1" fill="none">
    <path d="M300 340 Q 520 180, 740 340" />
    <path d="M460 340 Q 620 210, 880 340" />
    <path d="M600 340 Q 820 160, 1040 340" />
    <path d="M740 340 Q 960 200, 1180 340" />
    <path d="M300 340 Q 680 120, 1040 340" />
    <path d="M460 340 Q 780 100, 1180 340" />
  </g>

  <!-- Main neural network connection lines -->
  <g opacity="0.6" stroke="url(#line)" stroke-linecap="round">
    <!-- Layer 1 ’ Layer 2 -->
    <path d="M188 934L394 756L648 836L858 662L1132 714L1398 504" stroke-width="3.2"/>
    <path d="M246 448L508 312L720 466L1008 288L1266 404L1446 248" stroke-width="2.4"/>
    <path d="M320 180L566 246L744 138L988 232L1218 146L1428 220" stroke-width="2.1"/>
    <path d="M420 998L618 884L880 960L1098 854L1328 942" stroke-width="2.2"/>
    <!-- Cross-layer connections (attention paths) -->
    <path d="M552 318L658 566L858 662" stroke-width="1.8" opacity="0.8"/>
    <path d="M720 466L662 732L648 836" stroke-width="1.8" opacity="0.8"/>
    <path d="M1008 288L1010 558L1132 714" stroke-width="1.8" opacity="0.78"/>
    <path d="M1218 146L1266 404L1398 504" stroke-width="1.8" opacity="0.72"/>
    <path d="M988 232L1220 568L1328 942" stroke-width="1.6" opacity="0.62"/>
    <path d="M394 756L662 732L880 960" stroke-width="1.7" opacity="0.68"/>
    <path d="M246 448L552 318L720 466L858 662" stroke-width="1.7" opacity="0.54"/>
  </g>

  <!-- Token/layer halo rings -->
  <g opacity="0.28" stroke="#a7f3d0" stroke-width="1.2">
    <circle cx="1132" cy="714" r="116"/>
    <circle cx="720" cy="466" r="84"/>
    <circle cx="394" cy="756" r="68"/>
    <circle cx="1266" cy="404" r="54"/>
  </g>

  <!-- Bright node cores -->
  <g filter="url(#glow)">
    <circle cx="394" cy="756" r="14" fill="#34d399"/>
    <circle cx="720" cy="466" r="12" fill="#34d399"/>
    <circle cx="858" cy="662" r="13" fill="#6ee7b7"/>
    <circle cx="1132" cy="714" r="15" fill="#06b6d4"/>
    <circle cx="1266" cy="404" r="11" fill="#06b6d4"/>
    <circle cx="1398" cy="504" r="10" fill="#67e8f9"/>
  </g>

  <!-- Large gradient nodes (tokens / network layers) -->
  <g opacity="0.9">
    <circle cx="188" cy="934" r="32" fill="url(#nodeEmerald)"/>
    <circle cx="394" cy="756" r="38" fill="url(#nodeEmerald)"/>
    <circle cx="648" cy="836" r="30" fill="url(#nodeCyan)"/>
    <circle cx="720" cy="466" r="36" fill="url(#nodeEmerald)"/>
    <circle cx="858" cy="662" r="34" fill="url(#nodeEmerald)"/>
    <circle cx="1008" cy="288" r="34" fill="url(#nodeCyan)"/>
    <circle cx="1132" cy="714" r="40" fill="url(#nodeCyan)"/>
    <circle cx="1266" cy="404" r="36" fill="url(#nodeCyan)"/>
    <circle cx="1398" cy="504" r="28" fill="url(#nodeEmerald)"/>
  </g>

  <!-- Token row  small dots representing input tokens -->
  <g opacity="0.45" filter="url(#glowSoft)">
    <circle cx="300" cy="340" r="7" fill="#34d399"/>
    <circle cx="460" cy="340" r="7" fill="#34d399"/>
    <circle cx="600" cy="340" r="7" fill="#34d399"/>
    <circle cx="740" cy="340" r="7" fill="#34d399"/>
    <circle cx="880" cy="340" r="7" fill="#34d399"/>
    <circle cx="1040" cy="340" r="7" fill="#34d399"/>
    <circle cx="1180" cy="340" r="7" fill="#34d399"/>
  </g>

  <!-- Scatter dots (small secondary nodes) -->
  <g opacity="0.55" fill="#d1fae5">
    <circle cx="246" cy="448" r="5"/>
    <circle cx="320" cy="180" r="4"/>
    <circle cx="508" cy="312" r="5"/>
    <circle cx="566" cy="246" r="4"/>
    <circle cx="618" cy="884" r="5"/>
    <circle cx="662" cy="732" r="5"/>
    <circle cx="744" cy="138" r="4"/>
    <circle cx="880" cy="960" r="5"/>
    <circle cx="988" cy="232" r="5"/>
    <circle cx="1010" cy="558" r="4"/>
    <circle cx="1098" cy="854" r="4"/>
    <circle cx="1218" cy="146" r="5"/>
    <circle cx="1220" cy="568" r="4"/>
    <circle cx="1328" cy="942" r="4"/>
    <circle cx="1428" cy="220" r="4"/>
    <circle cx="1446" cy="248" r="4"/>
  </g>
</svg>
