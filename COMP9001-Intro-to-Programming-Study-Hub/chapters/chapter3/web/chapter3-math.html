<style>
.back-bar {
  position: sticky; top: 0; z-index: 50; background: var(--bg-sidebar); border-bottom: 1px solid var(--border);
  padding: 0.75rem 2rem; display: flex; align-items: center; justify-content: space-between;
}
.back-bar a { color: var(--accent); text-decoration: none; font-size: 0.9rem; font-weight: 500; display: flex; align-items: center; gap: 0.4rem; }
.back-bar .page-title-bar { font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }
#mainContent { margin-left: 0; }
.toc-sidebar {
  position: fixed; top: 50px; left: 0; width: var(--sidebar-w); height: calc(100vh - 50px);
  background: var(--bg-sidebar); border-right: 1px solid var(--border); overflow-y: auto; padding: 1.25rem 0; z-index: 40;
}
.toc-sidebar ul { list-style: none; }
.toc-sidebar li a { display: block; padding: 0.45rem 1.5rem; color: var(--text-muted); text-decoration: none; font-size: 0.82rem; border-left: 3px solid transparent; transition: all var(--transition); }
.toc-sidebar li a:hover { color: var(--text); background: rgba(108,140,255,0.05); }
.toc-sidebar li a.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-glow); font-weight: 500; }
.toc-group { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); padding: 0.75rem 1.5rem 0.35rem; margin-top: 0.5rem; }
.math-content { margin-left: var(--sidebar-w); }
.math-content .section { max-width: 860px; }
.symbol-grid { display: grid; grid-template-columns: auto 1fr 1fr; gap: 0; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin: 1.5rem 0; font-size: 0.9rem; }
.sym-header { background: var(--bg-card); padding: 0.6rem 1rem; font-weight: 600; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--border); }
.sym-cell { padding: 0.65rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; }
.sym-cell:nth-child(3n+1) { background: var(--bg-card); justify-content: center; font-size: 1rem; }
.sym-cell:nth-child(3n+2) { font-family: var(--font-mono); font-size: 0.82rem; color: var(--accent); }
.def-box { background: var(--bg-card); border: 1px solid var(--border); border-left: 4px solid var(--accent); border-radius: 0 var(--radius) var(--radius) 0; padding: 1.25rem 1.5rem; margin: 1.25rem 0; }
.def-box .def-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent); margin-bottom: 0.5rem; font-weight: 600; }
.def-box.example-box { border-left-color: var(--green); }
.def-box.example-box .def-label { color: var(--green); }
.def-box.warning-box { border-left-color: var(--yellow); }
.def-box.warning-box .def-label { color: var(--yellow); }
.quick-check { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; margin: 1.25rem 0; }
.quick-check .qc-question { font-weight: 600; margin-bottom: 0.75rem; font-size: 0.95rem; }
.qc-options { display: flex; flex-direction: column; gap: 0.4rem; }
.qc-opt { padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; font-size: 0.875rem; transition: all var(--transition); }
.qc-opt:hover { border-color: var(--accent); background: var(--accent-glow); }
.qc-opt.chosen { pointer-events: none; }
.qc-opt.right { border-color: var(--green); background: var(--green-bg); color: var(--green); }
.qc-opt.not-right { border-color: var(--red); background: var(--red-bg); color: var(--red); opacity: 0.7; }
.qc-feedback { margin-top: 0.75rem; padding: 0.75rem 1rem; border-radius: var(--radius-sm); font-size: 0.85rem; display: none; }
.qc-feedback.show { display: block; }
.qc-feedback.correct-fb { background: var(--green-bg); color: var(--green); border: 1px solid rgba(52,211,153,0.3); }
.qc-feedback.wrong-fb { background: var(--red-bg); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
@media (max-width: 900px) { .toc-sidebar { display:none; } .math-content { margin-left:0; } }
