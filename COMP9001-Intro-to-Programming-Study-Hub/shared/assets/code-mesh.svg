<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" fill="none">
  <defs>
    <linearGradient id="line" x1="195" y1="160" x2="1425" y2="1010" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="0.55" stop-color="#d97706"/>
      <stop offset="1" stop-color="#3776ab"/>
    </linearGradient>
    <radialGradient id="nodeAmber" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 0) rotate(90) scale(36)">
      <stop stop-color="#fef3c7"/>
      <stop offset="0.38" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 0) rotate(90) scale(42)">
      <stop stop-color="#dbeafe"/>
      <stop offset="0.4" stop-color="#6ba3cc"/>
      <stop offset="1" stop-color="#3776ab" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bracketGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#d97706" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowSoft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Code bracket patterns -->
  <g opacity="0.12" fill="url(#bracketGrad)">
    <text x="120" y="220" font-family="monospace" font-size="180" font-weight="700">{</text>
    <text x="1340" y="980" font-family="monospace" font-size="180" font-weight="700">}</text>
    <text x="900" y="320" font-family="monospace" font-size="100" font-weight="700" opacity="0.6">()</text>
    <text x="380" y="1020" font-family="monospace" font-size="120" font-weight="700" opacity="0.5">[]</text>
  </g>

  <!-- Code flow / function call connection lines -->
  <g opacity="0.6" stroke="url(#line)" stroke-linecap="round">
    <path d="M188 934L394 756L648 836L858 662L1132 714L1398 504" stroke-width="3.2"/>
    <path d="M246 448L508 312L720 466L1008 288L1266 404L1446 248" stroke-width="2.4"/>
    <path d="M320 180L566 246L744 138L988 232L1218 146L1428 220" stroke-width="2.1"/>
    <path d="M420 998L618 884L880 960L1098 854L1328 942" stroke-width="2.2"/>
    <path d="M552 318L658 566L858 662" stroke-width="1.8" opacity="0.8"/>
    <path d="M720 466L662 732L648 836" stroke-width="1.8" opacity="0.8"/>
    <path d="M1008 288L1010 558L1132 714" stroke-width="1.8" opacity="0.78"/>
    <path d="M1218 146L1266 404L1398 504" stroke-width="1.8" opacity="0.72"/>
    <path d="M988 232L1220 568L1328 942" stroke-width="1.6" opacity="0.62"/>
    <path d="M394 756L662 732L880 960" stroke-width="1.7" opacity="0.68"/>
    <path d="M246 448L552 318L720 466L858 662" stroke-width="1.7" opacity="0.54"/>
  </g>

  <!-- Code block outlines (rounded rects representing functions/modules) -->
  <g opacity="0.2" stroke="#fbbf24" stroke-width="1.4" fill="none" rx="8">
    <rect x="340" y="710" width="108" height="92" rx="10"/>
    <rect x="666" y="420" width="108" height="92" rx="10"/>
    <rect x="1078" y="668" width="108" height="92" rx="10"/>
    <rect x="1212" y="358" width="108" height="92" rx="10"/>
  </g>

  <!-- Terminal-style lines inside code blocks -->
  <g opacity="0.16" stroke="#fcd34d" stroke-width="1.5" stroke-linecap="round">
    <line x1="358" y1="732" x2="420" y2="732"/>
    <line x1="358" y1="748" x2="405" y2="748"/>
    <line x1="358" y1="764" x2="432" y2="764"/>
    <line x1="684" y1="442" x2="746" y2="442"/>
    <line x1="684" y1="458" x2="730" y2="458"/>
    <line x1="684" y1="474" x2="756" y2="474"/>
    <line x1="1096" y1="690" x2="1158" y2="690"/>
    <line x1="1096" y1="706" x2="1142" y2="706"/>
    <line x1="1096" y1="722" x2="1168" y2="722"/>
    <line x1="1230" y1="380" x2="1292" y2="380"/>
    <line x1="1230" y1="396" x2="1276" y2="396"/>
    <line x1="1230" y1="412" x2="1302" y2="412"/>
  </g>

  <!-- Amber glow nodes (code variables / data points) -->
  <g filter="url(#glow)">
    <circle cx="394" cy="756" r="14" fill="#fbbf24"/>
    <circle cx="720" cy="466" r="12" fill="#fbbf24"/>
    <circle cx="858" cy="662" r="13" fill="#fcd34d"/>
    <circle cx="1132" cy="714" r="15" fill="#3776ab"/>
    <circle cx="1266" cy="404" r="11" fill="#3776ab"/>
    <circle cx="1398" cy="504" r="10" fill="#6ba3cc"/>
  </g>

  <!-- Large diffuse nodes -->
  <g opacity="0.9">
    <circle cx="188" cy="934" r="32" fill="url(#nodeAmber)"/>
    <circle cx="394" cy="756" r="38" fill="url(#nodeAmber)"/>
    <circle cx="648" cy="836" r="30" fill="url(#nodeBlue)"/>
    <circle cx="720" cy="466" r="36" fill="url(#nodeAmber)"/>
    <circle cx="858" cy="662" r="34" fill="url(#nodeAmber)"/>
    <circle cx="1008" cy="288" r="34" fill="url(#nodeBlue)"/>
    <circle cx="1132" cy="714" r="40" fill="url(#nodeBlue)"/>
    <circle cx="1266" cy="404" r="36" fill="url(#nodeBlue)"/>
    <circle cx="1398" cy="504" r="28" fill="url(#nodeAmber)"/>
  </g>

  <!-- Small dot nodes -->
  <g opacity="0.55" fill="#fef3c7">
    <circle cx="246" cy="448" r="5"/>
    <circle cx="320" cy="180" r="4"/>
    <circle cx="508" cy="312" r="5"/>
    <circle cx="566" cy="246" r="4"/>
    <circle cx="618" cy="884" r="5"/>
    <circle cx="662" cy="732" r="5"/>
    <circle cx="744" cy="138" r="4"/>
    <circle cx="880" cy="960" r="5"/>
    <circle cx="988" cy="232" r="5"/>
    <circle cx="1010" cy="558" r="4"/>
    <circle cx="1098" cy="854" r="4"/>
    <circle cx="1218" cy="146" r="5"/>
    <circle cx="1220" cy="568" r="4"/>
    <circle cx="1328" cy="942" r="4"/>
    <circle cx="1428" cy="220" r="4"/>
    <circle cx="1446" cy="248" r="4"/>
  </g>

  <!-- Python blue accent arrows (function call direction) -->
  <g opacity="0.22" stroke="#3776ab" stroke-width="2" stroke-linecap="round" fill="none" filter="url(#glowSoft)">
    <path d="M508 312L540 298L524 330"/>
    <path d="M1008 288L1040 274L1024 306"/>
    <path d="M618 884L650 870L634 902"/>
  </g>
</svg>
