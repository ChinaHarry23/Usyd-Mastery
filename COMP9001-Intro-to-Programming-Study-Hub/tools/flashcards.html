<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards · COMP9001</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/study.css">
<script defer src="../data/site-data.js"></script>
<script defer src="../data/flashcard-data.js"></script>
<script defer src="../shared/flashcard-srs.js"></script>
</head>
<body>
  <div class="site-shell">
    <nav class="top-nav">
      <a class="brand" href="../index.html">
        <span class="brand-mark">C9</span>
        <span class="brand-copy"><strong>Flashcards</strong><span>Starter revision deck</span></span>
      </a>
      <div class="nav-links">
        <a href="../index.html">Home</a>
        <a href="quiz-hub.html">Quiz Hub</a>
      </div>
    </nav>
    <section class="page-hero hero-card">
      <span class="eyebrow">Shared tool</span>
      <h1>Flashcards</h1>
      <p>These are intentionally small starter cards so the site is usable now and easy to expand when the PDFs are fully turned into study notes.</p>
    </section>
    <section class="page-grid">
      <aside class="stack">
        <article class="panel">
          <h3>Chapter filter</h3>
          <div class="filter-row">
            <select id="chapterFilter">
              <option value="all">All available flashcards</option>
              <option value="1">Chapter 1</option>
              <option value="2">Chapter 2</option>
              <option value="3">Chapter 3</option>
              <option value="4">Chapter 4</option>
              <option value="5">Chapter 5</option>
            </select>
          </div>
        </article>
        <article class="panel">
          <h3>Deck size</h3>
          <p id="deckCount" class="muted"></p>
        </article>
      </aside>
      <div class="stack">
        <article class="flashcard">
          <span class="label" id="cardLabel"></span>
          <div class="front" id="cardFront"></div>
          <div class="back hidden" id="cardBack"></div>
          <div class="hero-actions">
            <button class="button" id="flipBtn" type="button">Show answer</button>
            <button class="button secondary" id="nextBtn" type="button">Next card</button>
          </div>
        </article>
      </div>
    </section>
  </div>
  <script>
    window.addEventListener("DOMContentLoaded", function () {
      var allCards = window.COMP9001_FLASHCARDS || [];
      var currentIndex = 0;
      var currentDeck = allCards.slice();
      var filter = document.getElementById("chapterFilter");
      var label = document.getElementById("cardLabel");
      var front = document.getElementById("cardFront");
      var back = document.getElementById("cardBack");
      var deckCount = document.getElementById("deckCount");
      var flipBtn = document.getElementById("flipBtn");
      var nextBtn = document.getElementById("nextBtn");

      function draw() {
        var card = currentDeck[currentIndex];
        if (!card) {
          label.textContent = "No cards available";
          front.textContent = "Add more flashcards in data/flashcard-data.js when you expand the chapters.";
          back.classList.add("hidden");
          deckCount.textContent = "0 cards";
          return;
        }
        label.textContent = "Chapter " + card.chapter;
        front.textContent = card.prompt;
        back.textContent = card.answer;
        back.classList.add("hidden");
        flipBtn.textContent = "Show answer";
        deckCount.textContent = currentDeck.length + " cards in this deck";
      }

      function applyFilter() {
        var value = filter.value;
        currentDeck = value === "all"
          ? allCards.slice()
          : allCards.filter(function (card) { return String(card.chapter) === value; });
        currentIndex = 0;
        draw();
      }

      flipBtn.addEventListener("click", function () {
        var hidden = back.classList.contains("hidden");
        back.classList.toggle("hidden");
        flipBtn.textContent = hidden ? "Hide answer" : "Show answer";
      });

      nextBtn.addEventListener("click", function () {
        currentIndex = window.nextFlashcardIndex(currentIndex, currentDeck.length);
        draw();
      });

      filter.addEventListener("change", applyFilter);
      applyFilter();
    });
  </script>
</body>
</html>
