<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards — COMP5270</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<link rel="stylesheet" href="../../shared/flashcards.css">
<link rel="stylesheet" href="../../shared/chat-panel.css">
</head>
<body>

<nav class="nav-bar">
  <a href="../index.html">Home</a>
  <a href="quiz-hub.html">Quiz</a>
  <a href="progress-dashboard.html">Progress</a>
  <span class="nav-title">Flashcards</span>
  <span class="nav-spacer"></span>
  <button id="langToggle">中文</button>
</nav>

<div class="config-panel">
  <div class="config-toggle open" id="configToggle">
    <span class="cfg-icon">&#x1F4E6;</span>
    <span class="cfg-label" id="lbl-configure">Configure Deck</span>
    <span class="cfg-summary" id="cfgSummary"></span>
    <span class="cfg-arrow">&#x25BC;</span>
  </div>
  <div class="config-body show" id="configBody">
    <div class="config-row">
      <div class="cfg-card" style="flex:2;">
        <h4 id="lbl-chapters">Chapters</h4>
        <div class="ch-chips" id="chChips">
          <button class="ch-chip-action" id="btnAllCh">All</button>
          <button class="ch-chip-action" id="btnNoneCh">None</button>
        </div>
      </div>
      <div class="cfg-card">
        <h4>Options</h4>
        <label class="toggle-row">
          <span class="toggle-label" id="lbl-shuffle">Shuffle deck</span>
          <input type="checkbox" id="chkShuffle"><span class="toggle-switch"></span>
        </label>
        <p style="font-size:0.72rem;color:var(--text-dim);line-height:1.5;margin-top:0.5rem;" id="srs-hint">SM-2 spaced repetition: flip, recall, rate. Overdue cards shown first.</p>
      </div>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-card due-stat">
      <div class="stat-value" id="statDue" style="color:var(--yellow);">0</div>
      <div class="stat-label">Due</div>
    </div>
    <div class="stat-card new-stat">
      <div class="stat-value" id="statNew" style="color:var(--accent);">0</div>
      <div class="stat-label">New</div>
    </div>
    <div class="stat-card total-stat">
      <div class="stat-value" id="statTotal" style="color:var(--green);">0</div>
      <div class="stat-label">Total</div>
    </div>
  </div>
  <div class="action-row">
    <button class="btn btn-primary" id="btnStart">Start session</button>
    <button class="btn btn-ghost" id="btnClearSRS">Reset SRS progress</button>
  </div>
</div>

<div class="fc-wrapper">
  <div class="empty-hero" id="emptyState">
    <span class="empty-icon">&#x1F4E6;</span>
    <h2 id="empty-title">Spaced-repetition flashcards</h2>
    <p id="empty-desc">About <strong>120</strong> cards across 12 chapters. Pick chapters, then <strong>Start session</strong>.</p>
    <div class="kbd-hints">
      <span class="kbd"><kbd>Space</kbd> Flip card</span>
      <span class="kbd"><kbd>1</kbd>–<kbd>4</kbd> Rate</span>
    </div>
  </div>
  <div id="fcArea" style="display:none;"></div>
</div>

<script src="../../shared/flashcard-srs.js"></script>
<script src="../data/flashcard-data.js"></script>
<script>
window.FLASHCARD_CONFIG = { courseCode: "comp5270", numChapters: 12, totalCards: 120, progressKey: "comp5270_progress" };
</script>
<script src="../../shared/flashcards.js"></script>
<script src="../../shared/chat-panel.js"></script>
</body>
</html>
