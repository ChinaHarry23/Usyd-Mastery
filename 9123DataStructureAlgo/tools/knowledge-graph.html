<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://cdn.jsdelivr.net https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://cdn.jsdelivr.net https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' http://localhost:* http://127.0.0.1:*; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Graph — COMP9123</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous" referrerpolicy="no-referrer">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" integrity="sha384-+VBxd3r6XgURycqtZ117nYw44OOcIax56Z4dCRWbxyPt0Koah1uHoK0o4+/RRE05" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<link rel="stylesheet" href="../../shared/knowledge-graph.css">
<link rel="stylesheet" href="../../shared/chat-panel.css">
<style>
.controls label { font-size: 0.72rem; margin-right: 0.35rem; white-space: nowrap; }
</style>
<meta name="description" content="Knowledge Graph — COMP9123 — Interactive force-directed concept graph with chapter filtering, search, and difficulty sorting.">
<meta property="og:type" content="website">
<meta property="og:title" content="Knowledge Graph — COMP9123">
<meta property="og:description" content="Knowledge Graph — COMP9123 — Interactive force-directed concept graph with chapter filtering, search, and difficulty sorting.">
<meta property="og:locale" content="en_AU">
</head>
<body>

<div class="top-bar">
  <a href="../index.html" id="navHome">&larr; Home</a>
  <span class="sep" style="width:1px;height:16px;background:var(--border);"></span>
  <span class="title" id="pageTitle">Knowledge Graph</span>
  <span class="spacer"></span>
  <input class="search-box" id="searchBox" type="text" placeholder="Search concepts...">
  <div class="controls" style="flex-wrap:wrap;max-width:52rem;">
    <span class="sep"></span>
    <label><input type="checkbox" id="chkCh1" checked> <span id="labelCh1">Ch1</span></label>
    <label><input type="checkbox" id="chkCh2" checked> <span id="labelCh2">Ch2</span></label>
    <label><input type="checkbox" id="chkCh3" checked> <span id="labelCh3">Ch3</span></label>
    <label><input type="checkbox" id="chkCh4" checked> <span id="labelCh4">Ch4</span></label>
    <label><input type="checkbox" id="chkCh5" checked> <span id="labelCh5">Ch5</span></label>
    <label><input type="checkbox" id="chkCh6" checked> <span id="labelCh6">Ch6</span></label>
    <label><input type="checkbox" id="chkCh7" checked> <span id="labelCh7">Ch7</span></label>
    <label><input type="checkbox" id="chkCh8" checked> <span id="labelCh8">Ch8</span></label>
    <label><input type="checkbox" id="chkCh9" checked> <span id="labelCh9">Ch9</span></label>
    <label><input type="checkbox" id="chkCh10" checked> <span id="labelCh10">Ch10</span></label>
    <span class="sep"></span>
    <label><span id="thresholdText">Threshold</span> <input type="range" id="thresholdSlider" min="1" max="10" value="3" step="1"> <span id="thresholdVal">3</span></label>
    <span class="sep"></span>
    <button id="btnDiffSort">Sort by Difficulty</button>
    <button id="btnChapterSort">Group by Chapter</button>
    <button id="btnReset">Reset View</button>
  </div>
</div>

<canvas id="graphCanvas"></canvas>

<div class="tooltip" id="tooltip">
  <div class="tt-label" id="ttLabel"></div>
  <div class="tt-chapter" id="ttChapter"></div>
  <div class="tt-diff" id="ttDiff"></div>
  <div class="tt-def" id="ttDef"></div>
  <div class="tt-conn" id="ttConn"></div>
  <div class="tt-hint" id="ttHint"></div>
</div>

<div class="legend">
  <h4 id="legendWeeks">Weeks</h4>
  <div class="legend-item" id="legendW1"><span class="legend-dot" style="background:#f59e0b"></span><span> W1</span></div>
  <div class="legend-item" id="legendW2"><span class="legend-dot" style="background:#ea580c"></span><span> W2</span></div>
  <div class="legend-item" id="legendW3"><span class="legend-dot" style="background:#d97706"></span><span> W3</span></div>
  <div class="legend-item" id="legendW4"><span class="legend-dot" style="background:#84cc16"></span><span> W4</span></div>
  <div class="legend-item" id="legendW5"><span class="legend-dot" style="background:#16a34a"></span><span> W5</span></div>
  <div class="legend-item" id="legendW6"><span class="legend-dot" style="background:#059669"></span><span> W6</span></div>
  <div class="legend-item" id="legendW7"><span class="legend-dot" style="background:#0d9488"></span><span> W7</span></div>
  <div class="legend-item" id="legendW8"><span class="legend-dot" style="background:#0891b2"></span><span> W8</span></div>
  <div class="legend-item" id="legendW9"><span class="legend-dot" style="background:#2563eb"></span><span> W9</span></div>
  <div class="legend-item" id="legendW10"><span class="legend-dot" style="background:#7c3aed"></span><span> W10</span></div>
  <div class="legend-section">
    <h4 id="legendDiff">Difficulty</h4>
    <div class="legend-item" id="legendDiffScale" style="font-size:0.7rem;">&#9679; small = easy</div>
    <div class="legend-item" id="legendClick" style="font-size:0.7rem;">Click node &rarr; source page</div>
  </div>
  <div class="legend-section">
    <h4 id="legendLayout">Layout</h4>
    <div class="legend-item" id="legendSort" style="font-size:0.7rem;"><strong>Sort by Difficulty</strong></div>
    <div class="legend-item" id="legendGroup" style="font-size:0.7rem;"><strong>Group by Chapter</strong></div>
    <div class="legend-item" id="legendBoth" style="font-size:0.65rem;">Combine both modes if needed.</div>
  </div>
</div>

<div class="stats" id="statsBox"></div>

<script src="kg-data.js"></script>
<script src="../../shared/knowledge-graph.js"></script>
<script src="../../shared/chat-panel.js"></script>
</body>
</html>
